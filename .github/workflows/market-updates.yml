name: Market Updates

# Each cron maps 1-to-1 to an update type — no time-window checks in Python.
# GitHub Actions crons can fire hours late; explicit --type bypasses that.
#
#   0 12 * * 1-5  → morning    (08:00 EDT) — FULL DAILY BRIEF (flagship issue)
#   0 16 * * 1-5  → midday     (12:00 EDT) — short update
#   15 20 * * 1-5 → close      (16:15 EDT) — short update
#   30 22 * * 1-5 → afterhours (18:30 EDT) — conditional short update

on:
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "15 20 * * 1-5"
    - cron: "30 22 * * 1-5"

  workflow_dispatch:
    inputs:
      update_type:
        description: "Update type"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - midday
          - close
          - afterhours
          - breaking

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase works

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Resolve update type
        id: update_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ inputs.update_type }}"
            TRIGGER="manual"
          else
            case "${{ github.event.schedule }}" in
              "0 12 * * 1-5")  TYPE="morning" ;;
              "0 16 * * 1-5")  TYPE="midday" ;;
              "15 20 * * 1-5") TYPE="close" ;;
              "30 22 * * 1-5") TYPE="afterhours" ;;
              *)               TYPE="morning" ;;
            esac
            TRIGGER="scheduled"
          fi
          echo "type=$TYPE"       >> $GITHUB_OUTPUT
          echo "trigger=$TRIGGER" >> $GITHUB_OUTPUT
          echo "schedule=${{ github.event.schedule }}" >> $GITHUB_OUTPUT
          echo "Resolved → type=$TYPE | trigger=$TRIGGER | cron=${{ github.event.schedule }}"

      - name: Skip if already published today (scheduled runs only)
        id: skip_check
        if: steps.update_type.outputs.trigger == 'scheduled'
        run: |
          TYPE="${{ steps.update_type.outputs.type }}"
          DATE=$(TZ=America/New_York date +'%Y-%m-%d')
          # morning → full brief in briefs/; midday/close/afterhours → updates/
          if [ "$TYPE" = "morning" ]; then
            FILE="briefs/${DATE}.html"
          else
            FILE="updates/${DATE}-${TYPE}.html"
          fi
          if [ -f "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already published today: $FILE — skipping to avoid duplicates."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No existing $FILE — proceeding."
          fi

      - name: Generate market update
        if: steps.skip_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_TRIGGER: ${{ steps.update_type.outputs.trigger }}
        run: |
          TYPE="${{ steps.update_type.outputs.type }}"
          echo "Starting generation: --type $TYPE"

          # Retry up to 3 times on failure (API timeouts, rate limits, etc.)
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            if python scripts/generate_brief.py --type "$TYPE"; then
              echo "Generation succeeded on attempt $attempt."
              break
            else
              EXIT_CODE=$?
              echo "Attempt $attempt failed (exit $EXIT_CODE)."
              if [ $attempt -lt 3 ]; then
                echo "Waiting 30s before retry..."
                sleep 30
              else
                echo "All 3 attempts failed. Marking workflow as failed."
                exit 1
              fi
            fi
          done

      - name: Validate site routing and templates
        if: steps.skip_check.outputs.skip != 'true'
        run: python scripts/validate_site.py

      - name: Commit and push
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No files changed — nothing to commit."
            exit 0
          fi

          TYPE="${{ steps.update_type.outputs.type }}"
          DATE=$(TZ=America/New_York date +'%Y-%m-%d')
          case "$TYPE" in
            morning)    MSG="Generate morning full brief ${DATE}" ;;
            midday)     MSG="Generate midday market update ${DATE}" ;;
            close)      MSG="Generate market close update ${DATE}" ;;
            afterhours) MSG="Generate afterhours update ${DATE}" ;;
            breaking)   MSG="Generate breaking market update ${DATE}" ;;
            *)          MSG="Generate market update ${DATE}" ;;
          esac

          git config user.name "The Brief Bot"
          git config user.email "brief-bot@users.noreply.github.com"
          git commit -m "$MSG"

          # Pull-rebase before push to handle concurrent runs without force-pushing
          git pull --rebase origin main
          git push origin main
