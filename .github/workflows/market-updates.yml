name: Market Updates

# Four cron triggers — one per daily ET target (EDT = UTC-4).
# IMPORTANT: Each cron maps directly to an update type in the workflow.
# The Python script is called with an explicit --type, NOT --type auto.
# This means GitHub Actions delays (sometimes hours) do NOT cause the
# run to silently exit — the right update type always publishes.
#
#   0 12 * * 1-5  → morning    (08:00 EDT)
#   0 16 * * 1-5  → midday     (12:00 EDT)
#   15 20 * * 1-5 → close      (16:15 EDT)
#   30 22 * * 1-5 → afterhours (18:30 EDT)

on:
  schedule:
    - cron: "0 12 * * 1-5"    # morning
    - cron: "0 16 * * 1-5"    # midday
    - cron: "15 20 * * 1-5"   # close
    - cron: "30 22 * * 1-5"   # afterhours

  workflow_dispatch:
    inputs:
      update_type:
        description: "Update type to generate"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - midday
          - close
          - afterhours
          - breaking

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine update type from cron or dispatch
        id: update_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ inputs.update_type }}"
            TRIGGER="manual"
          else
            # Map each cron expression directly to its intended update type.
            # This avoids silent failures caused by GitHub Actions running late.
            case "${{ github.event.schedule }}" in
              "0 12 * * 1-5")  TYPE="morning" ;;
              "0 16 * * 1-5")  TYPE="midday" ;;
              "15 20 * * 1-5") TYPE="close" ;;
              "30 22 * * 1-5") TYPE="afterhours" ;;
              *)               TYPE="morning" ;;  # fallback
            esac
            TRIGGER="scheduled"
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "trigger=$TRIGGER" >> $GITHUB_OUTPUT
          echo "Resolved: type=$TYPE trigger=$TRIGGER schedule=${{ github.event.schedule }}"

      - name: Generate market update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_TRIGGER: ${{ steps.update_type.outputs.trigger }}
        run: |
          echo "Running: python scripts/generate_brief.py --type ${{ steps.update_type.outputs.type }}"
          python scripts/generate_brief.py --type ${{ steps.update_type.outputs.type }}

      - name: Check for changed files
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No files changed — nothing to commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --cached --name-only
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          TYPE="${{ steps.update_type.outputs.type }}"
          DATE=$(TZ=America/New_York date +'%Y-%m-%d')
          case "$TYPE" in
            morning)    MSG="Generate morning market brief ${DATE}" ;;
            midday)     MSG="Generate midday market update ${DATE}" ;;
            close)      MSG="Generate market close recap ${DATE}" ;;
            afterhours) MSG="Generate afterhours update ${DATE}" ;;
            breaking)   MSG="Generate breaking market update ${DATE}" ;;
            *)          MSG="Generate market update ${DATE}" ;;
          esac
          git config user.name "The Brief Bot"
          git config user.email "brief-bot@users.noreply.github.com"
          git commit -m "$MSG"
          git push
