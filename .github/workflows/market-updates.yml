name: Market Updates

# Schedule targets Eastern Daylight Time (EDT = UTC-4, used March–November).
# Four cron entries — one per target ET time.
# The Python script verifies America/New_York time internally and exits cleanly
# if the run lands outside its allowed window (e.g. GitHub delay, DST edge).
#
#   08:00 ET = 12:00 UTC (EDT)
#   12:00 ET = 16:00 UTC (EDT)
#   16:15 ET = 20:15 UTC (EDT)
#   18:30 ET = 22:30 UTC (EDT)
#
# EST (UTC-5) runs Nov–Mar. During that period the cron fires an hour earlier
# ET, which still falls within the ±45-min auto-mode windows in the script.

on:
  schedule:
    - cron: "0 12 * * 1-5"    # 08:00 EDT / 07:00 EST
    - cron: "0 16 * * 1-5"    # 12:00 EDT / 11:00 EST
    - cron: "15 20 * * 1-5"   # 16:15 EDT / 15:15 EST
    - cron: "30 22 * * 1-5"   # 18:30 EDT / 17:30 EST

  workflow_dispatch:
    inputs:
      update_type:
        description: "Update type to generate"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - midday
          - close
          - afterhours
          - breaking

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine update type
        id: update_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.update_type }}" >> $GITHUB_OUTPUT
            echo "trigger=manual" >> $GITHUB_OUTPUT
          else
            echo "type=auto" >> $GITHUB_OUTPUT
            echo "trigger=scheduled" >> $GITHUB_OUTPUT
          fi

      - name: Generate market update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_TRIGGER: ${{ steps.update_type.outputs.trigger }}
        run: |
          python scripts/generate_brief.py --type ${{ steps.update_type.outputs.type }}

      - name: Check for changed files
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No files changed — nothing to commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --cached --name-only
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          UPDATE_TYPE="${{ steps.update_type.outputs.type }}"
          DATE=$(TZ=America/New_York date +'%Y-%m-%d')

          case "$UPDATE_TYPE" in
            morning)    MSG="Generate morning market brief ${DATE}" ;;
            midday)     MSG="Generate midday market update ${DATE}" ;;
            close)      MSG="Generate market close recap ${DATE}" ;;
            afterhours) MSG="Generate afterhours update ${DATE}" ;;
            breaking)   MSG="Generate breaking market update ${DATE}" ;;
            *)          MSG="Generate market update ${DATE}" ;;
          esac

          git config user.name "The Brief Bot"
          git config user.email "brief-bot@users.noreply.github.com"
          git commit -m "$MSG"
          git push
