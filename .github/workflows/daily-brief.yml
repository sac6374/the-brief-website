# DISABLED — replaced by market-updates.yml
# This workflow's schedule has been removed to prevent conflicts.
# Manual workflow_dispatch is kept for emergency use only.
name: Generate Daily Brief (Legacy — Disabled)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type LEGACY to confirm you mean to run the old generator"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'LEGACY' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pytz

      - name: Generate today's brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_brief.py --type close

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git config user.name "The Brief Bot"
            git config user.email "brief-bot@users.noreply.github.com"
            git commit -m "Generate market close recap $(date -u +'%Y-%m-%d') [legacy]"
            git push
          fi
