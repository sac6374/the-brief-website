name: Generate Daily Brief

on:
  schedule:
    # 8:30 AM ET on weekdays (12:30 UTC, adjusted for ET = UTC-4 in summer / UTC-5 in winter)
    # Using 13:00 UTC to safely cover both EST and EDT
    - cron: "0 13 * * 1-5"
  workflow_dispatch: # Also allows manual trigger from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit and push generated files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate today's brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_brief.py

      - name: Check for new files
        id: check_changes
        run: |
          git diff --quiet && git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT
          git status

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "The Brief Bot"
          git config user.email "brief-bot@users.noreply.github.com"
          git add briefs/ index.html archive.html linkedin/
          git commit -m "Brief: $(date +'%Y-%m-%d') auto-generated issue"
          git push
