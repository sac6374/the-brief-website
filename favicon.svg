<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Option 3: Serif italic editorial mark — no box, pure typography -->
  <rect width="32" height="32" fill="#0d1b2a"/>
  <!-- Large italic serif B — editorial publication style -->
  <text x="16" y="26"
    font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="26"
    font-weight="700"
    font-style="italic"
    fill="#a07820"
    text-anchor="middle"
    dominant-baseline="auto">B</text>
  <!-- Hairline rule beneath — editorial footer -->
  <rect x="9" y="28.5" width="14" height="0.75" fill="#a07820" opacity="0.45"/>
</svg>
